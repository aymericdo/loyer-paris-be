name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MONGODB_URI_EMPRISE_BATIE: ${{ secrets.MONGODB_URI_EMPRISE_BATIE }}
      MONGODB_URI_ZONES: ${{ secrets.MONGODB_URI_ZONES }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
        mongodb-version: ['4.0']
    steps:
      # 1. Checkout en premier
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node (avec npm 11)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable Corepack & Install npm 11
        run: |
          corepack enable
          corepack prepare npm@11 --activate

      # 3. Setup Sentry
      - name: Setup Sentry CLI
        uses: matbour/setup-sentry-cli@v1
        with:
          version: latest
          url: https://encadrement-loyers.sentry.io/
          token: ${{ secrets.SENTRY_AUTH_TOKEN }}
          organization: encadrement-loyers
          project: node

      # 4. Start MongoDB
      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.6.0
        with:
          mongodb-version: ${{ matrix.mongodb-version }}

      # 5. Étapes de build/test
      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
        env:
          CI: true

      - name: Lint
        run: npm run lint
